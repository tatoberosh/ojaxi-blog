# .github/workflows/hugo.yml
name: Deploy Ojakee Blog

on:
  push:
    branches: ["master"]  # ← you're using master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # --- ADD THIS NODE.JS SETUP STEP ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'  # LTS version, change to match your local version
      
      - name: Install Node.js Dependencies
        run: npm install  # This installs chart.js and any other dependencies
      # --- END OF ADDED NODE.JS SETUP ---

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4